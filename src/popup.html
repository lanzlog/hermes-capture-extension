<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; font-family: "Segoe UI", system-ui, sans-serif;
           margin: 0; padding: 14px; background: #1E2127; color: #ABB2BF; }
    h1 { font-size: 14px; margin: 0 0 10px; color: #E5C07B; }
    .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .row.between { justify-content: space-between; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #E06C75; flex-shrink: 0; }
    .dot.on { background: #98C379; }
    .dot.wait { background: #E5C07B; }
    .dot.off { background: #5C6370; }
    label { font-size: 12px; }
    input[type="number"] { width: 70px; background: #2C313A; color: #ABB2BF;
            border: 1px solid #3A3F4B; border-radius: 4px; padding: 4px; }
    button { background: #3A5B85; color: #fff; border: 0; border-radius: 4px;
             padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .hint { font-size: 11px; color: #6B717D; margin-top: 10px; line-height: 1.4; }
    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #3A3F4B;
              border-radius: 22px; transition: .15s; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px;
                     left: 3px; bottom: 3px; background: #ABB2BF; border-radius: 50%;
                     transition: .15s; }
    .switch input:checked + .slider { background: #3E5C3E; }
    .switch input:checked + .slider:before { transform: translateX(20px); background: #98C379; }
    .switch-label { font-size: 12px; font-weight: 600; color: #E5C07B; }
    .switch-label.off { color: #6B717D; }
  </style>
</head>
<body>
  <h1>Hermes Capture</h1>

  <div class="row between">
    <div class="row" style="margin:0">
      <span id="dot" class="dot"></span>
      <span id="status">…</span>
    </div>
    <div class="row" style="margin:0; gap:6px">
      <span id="enabledLabel" class="switch-label">ON</span>
      <label class="switch" title="Enable / disable bridge connection">
        <input type="checkbox" id="enabled" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="row">
    <label>App port</label>
    <input id="port" type="number" min="1" max="65535" />
    <button id="save">Save</button>
  </div>
  <div class="hint">
    Toggle OFF to fully stop the WebSocket (no reconnect spam).
    ON + Hermes desktop app running → green badge, ready to capture.
  </div>
  <script src="popup.js"></script>
</body>
</html>
