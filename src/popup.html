<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; font-family: "Segoe UI", system-ui, sans-serif;
           margin: 0; padding: 14px; background: #1E2127; color: #ABB2BF; }
    h1 { font-size: 14px; margin: 0 0 10px; color: #E5C07B; }
    .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #E06C75; }
    .dot.on { background: #98C379; }
    .dot.wait { background: #E5C07B; }
    label { font-size: 12px; }
    input { width: 70px; background: #2C313A; color: #ABB2BF;
            border: 1px solid #3A3F4B; border-radius: 4px; padding: 4px; }
    button { background: #3A5B85; color: #fff; border: 0; border-radius: 4px;
             padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .hint { font-size: 11px; color: #6B717D; margin-top: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>Hermes Capture</h1>
  <div class="row"><span id="dot" class="dot"></span><span id="status">Disconnected</span></div>
  <div class="row">
    <label>App port</label>
    <input id="port" type="number" min="1" max="65535" />
    <button id="save">Save</button>
  </div>
  <div class="hint">
    Open the Hermes desktop app (it listens on this port), pick this
    browser's window in its list, and press Record. While the app is
    closed the extension backs off reconnects so the console stays quiet.
  </div>
  <script src="popup.js"></script>
</body>
</html>
